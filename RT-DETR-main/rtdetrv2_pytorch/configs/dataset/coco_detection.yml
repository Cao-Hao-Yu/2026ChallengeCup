task: detection

# 已更改图像路径以及种类数量

evaluator:
  type: CocoEvaluator
  iou_types: ['bbox', ]

# num_classes: 365
# remap_mscoco_category: False

# num_classes: 91
# remap_mscoco_category: False

# num_classes: 80
# remap_mscoco_category: True

num_classes: 25
remap_mscoco_category: False


train_dataloader: 
  type: DataLoader
  dataset: 
    type: CocoDetection
    # img_folder: ./dataset/coco/train2017/
    # ann_file: ./dataset/coco/annotations/instances_train2017.json
    img_folder: D:/DeepLearning/Challenger/data/dataset_coco/images/train/
    ann_file: D:/DeepLearning/Challenger/data/dataset_coco/train.json
    return_masks: False
    transforms:
      type: Compose
      ops: ~
  shuffle: True
  num_workers: 4
  drop_last: True 
  collate_fn:
    type: BatchImageCollateFunction


val_dataloader:
  type: DataLoader
  dataset: 
    type: CocoDetection
    # img_folder: ./dataset/coco/val2017/
    # ann_file: ./dataset/coco/annotations/instances_val2017.json
    img_folder: D:/DeepLearning/Challenger/data/dataset_coco/images/val/
    ann_file: D:/DeepLearning/Challenger/data/dataset_coco/val.json
    return_masks: False
    transforms:
      type: Compose
      ops: ~ 
  shuffle: False
  num_workers: 4
  drop_last: False
  collate_fn:
    type: BatchImageCollateFunction
